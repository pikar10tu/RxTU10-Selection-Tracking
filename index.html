<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RxTU10</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
:root{--sci:#2563eb;--care:#10b981;--gold:#f59e0b;--bg:#f0f4f8;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--ticker:34px;--btm:66px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);}

/* ── TOP BAR ── */
/* top-bar removed */
/* coin-pill และ btn-daily ถูกนิยามใหม่ใน HOME section ด้านล่าง */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.btn-out{background:none;border:1.5px solid #fca5a5;color:#ef4444;padding:7px 14px;border-radius:9px;font-family:inherit;font-size:0.82rem;cursor:pointer;width:100%;}
.btn-google{background:#fff;border:1.5px solid var(--border);padding:6px 11px;border-radius:9px;font-family:inherit;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);font-weight:500;transition:.2s;}
.btn-google.big{padding:13px 22px;font-size:0.95rem;width:100%;justify-content:center;}

/* ── NEWS TICKER ── */
/* ticker now inline in Play tab */
.ticker-label{background:#f59e0b;color:#1e293b;padding:3px 9px;font-weight:800;font-size:0.72rem;white-space:nowrap;border-radius:6px 0 0 6px;}
.ticker-scroll{flex:1;overflow:hidden;position:relative;height:34px;}
.ticker-inner{position:absolute;white-space:nowrap;animation:tickerMove 22s linear infinite;padding:0 12px;line-height:34px;font-size:0.8rem;}
@keyframes tickerMove{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.ticker-inner:hover{animation-play-state:paused;}
.news-banner{background:linear-gradient(135deg,#1e293b,#334155);color:#fde68a;font-weight:600;display:flex;align-items:center;border-radius:12px;overflow:hidden;cursor:pointer;margin-bottom:10px;height:36px;}

/* ── MAIN ── */
#main-content{
    position:fixed;
    top:0;left:0;right:0;
    bottom:var(--btm);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:12px 12px 24px;
}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--btm);background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -3px 12px rgba(0,0,0,.07);padding-bottom:env(safe-area-inset-bottom,0px);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);font-size:0.67rem;font-weight:600;transition:.15s;padding:5px 2px;}
.bn-icon{font-size:1.3rem;transition:.15s;}
.bn-item.active{color:var(--gold);}
.bn-item.active .bn-icon{transform:translateY(-2px);}

/* ── COMMON ── */
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:10px;}
.sec-head{font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;text-align:center;margin:16px 0 8px;}
.login-card{background:#fff;border-radius:20px;padding:36px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.07);}
.guest-badge{background:#64748b;}
/* .track-badge นิยามใน HOME section */

/* ── HOME ── */
/* Hero banner */
.home-hero{border-radius:20px;overflow:hidden;margin-bottom:10px;position:relative;}
.hero-bg{background:linear-gradient(160deg,#0c1445 0%,#1a237e 40%,#0d47a1 70%,#1565c0 100%);padding:20px 16px 0;position:relative;}
.hero-bg::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.hero-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;}
.pc-img-wrap{position:relative;flex-shrink:0;}
.pc-img{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.3);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.pc-cam{position:absolute;bottom:-1px;right:-1px;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;width:22px;height:22px;font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pc-nick{font-size:1.05rem;font-weight:800;color:#fff;line-height:1.2;}
.pc-real{font-size:0.76rem;color:rgba(255,255,255,.6);margin-top:1px;}
.pc-id{font-size:0.64rem;color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;margin-top:2px;}
/* action bar */
.hero-actions{display:flex;align-items:center;gap:7px;position:relative;padding-bottom:14px;}
.coin-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(4px);padding:7px 13px;border-radius:20px;font-size:0.88rem;font-weight:700;color:#fbbf24;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;}
.coin-pill:hover{background:rgba(255,255,255,.18);}
.btn-daily{background:rgba(16,185,129,.2);border:1.5px solid rgba(16,185,129,.5);padding:7px 12px;border-radius:20px;font-size:0.84rem;cursor:pointer;color:#6ee7b7;font-family:inherit;font-weight:700;transition:.2s;}
.btn-daily.ready{background:rgba(16,185,129,.3);border-color:#10b981;animation:pulse 2s ease infinite;color:#a7f3d0;}
.btn-out-hero{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:7px 11px;border-radius:20px;font-family:inherit;font-size:0.76rem;cursor:pointer;margin-left:auto;}
/* hero stats strip */
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);background:#0a0f2e;border-top:1px solid rgba(255,255,255,.1);}
.hs-cell{padding:11px 6px;text-align:center;}
.hs-cell b{display:block;font-size:1.05rem;font-weight:800;color:#fff;}
.hs-cell small{font-size:0.62rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;}
/* track pill */
.track-badge{padding:3px 8px;border-radius:5px;color:#fff;font-size:0.58rem;font-weight:700;text-transform:uppercase;}
.track-badge.sm{font-size:0.54px;padding:2px 6px;}
/* .stats-row/.stat-box removed — replaced by hero-stats strip */
/* unlinked */
.unlinked-card{display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:10px;border:2px dashed var(--border);}
.ul-left{display:flex;align-items:center;gap:9px;flex:1;}
.ul-img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.btn-link{background:linear-gradient(135deg,var(--sci),#1d4ed8);color:#fff;border:none;padding:7px 12px;border-radius:9px;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;}
/* collection card upgrade */
.coll-card{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;padding:14px;margin-bottom:10px;color:#fff;}
.coll-bar-bg{height:7px;background:rgba(255,255,255,.1);border-radius:50px;overflow:hidden;margin:8px 0;}
.coll-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:50px;transition:.6s;}
.rarity-chip{padding:4px 9px;border-radius:20px;font-size:0.65rem;font-weight:700;border:1px solid;}
/* egg section */
.egg-section-head{display:flex;align-items:center;justify-content:space-between;margin:14px 0 7px;}
.egg-section-head span{font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
/* inv upgrade */
.inv-item{background:var(--rb,#f8fafc);border:2px solid transparent;border-radius:11px;padding:8px 4px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.inv-item:hover{transform:translateY(-2px);border-color:var(--rc);}
.inv-item.on{border-color:var(--rc);box-shadow:0 0 10px color-mix(in srgb,var(--rc) 20%,transparent);}
/* pet badge effects */
/* pet-badge-gold/rainbow/kirin นิยามซ้ำด้านล่าง ลบ duplicate นี้ออก */

/* Inventory */
.inv-empty{text-align:center;color:var(--muted);font-size:0.82rem;padding:16px;}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;}
.inv-item{background:var(--rb,#f8fafc);border:2px solid transparent;border-radius:11px;padding:8px 4px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.inv-item:hover{transform:translateY(-2px);border-color:var(--rc);}
.inv-item.on{border-color:var(--rc);box-shadow:0 0 10px color-mix(in srgb,var(--rc) 20%,transparent);}
.inv-em{font-size:1.6rem;} .inv-nm{font-size:0.62rem;font-weight:600;margin-top:2px;}
.inv-on{position:absolute;top:-5px;right:-5px;background:var(--rc);color:#fff;font-size:0.46rem;font-weight:700;padding:2px 4px;border-radius:4px;}

/* ── MEMBERS ── */
.filter-row{display:flex;gap:6px;margin-bottom:8px;}
.fbtn{flex:1;padding:7px 3px;border-radius:10px;border:2px solid var(--border);background:#fff;font-family:inherit;font-size:0.76rem;font-weight:600;cursor:pointer;color:var(--muted);transition:.2s;}
.fbtn.fa{border-color:var(--gold);background:#fffbeb;color:#92400e;}
.fbtn.fs{border-color:var(--sci);background:#eff6ff;color:var(--sci);}
.fbtn.fc{border-color:var(--care);background:#ecfdf5;color:var(--care);}
.search-box{margin-bottom:8px;}
.srch-inp{width:100%;padding:10px 13px;border:2px solid #fff;border-radius:12px;font-family:inherit;font-size:0.9rem;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.07);outline:none;transition:.2s;}
.srch-inp:focus{border-color:var(--gold);}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;}
.mcard{background:#fff;border-radius:13px;padding:11px 6px;cursor:pointer;text-align:center;border:1.5px solid var(--border);transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mcard:hover{transform:translateY(-2px);box-shadow:0 5px 12px rgba(0,0,0,.07);}
.mc-img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.1);}
/* .mc-emoji-fallback removed — not used */
.mc-nick{font-weight:600;font-size:0.82rem;} .mc-id{font-size:0.62rem;color:var(--muted);}
.prog-bar{height:16px;background:var(--border);border-radius:50px;overflow:hidden;display:flex;margin-bottom:4px;}
.pb-sci{background:var(--sci);height:100%;} .pb-care{background:var(--care);height:100%;}
.prog-lbls{display:flex;justify-content:space-between;font-size:0.76rem;font-weight:600;}

/* ── PLAY ── */
/* Game arena cards */
.game-arena{border-radius:20px;overflow:hidden;margin-bottom:12px;position:relative;}
.game-arena-header{padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;}
.game-arena-body{padding:0 14px 16px;}
/* Quiz: ทายชื่อ — deep navy theme */
.arena-name{background:linear-gradient(160deg,#0f172a 0%,#1e293b 60%,#1e3a5f 100%);}
.arena-name .game-arena-header{border-bottom:1px solid rgba(255,255,255,.08);}
/* Quiz: ทายยา — deep indigo theme */
.arena-drug{background:linear-gradient(160deg,#1e1b4b 0%,#312e81 60%,#1e3a8a 100%);}
.arena-drug .game-arena-header{border-bottom:1px solid rgba(255,255,255,.08);}

/* score badge */
.score-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;color:#fff;font-size:0.78rem;font-weight:700;display:flex;align-items:center;gap:5px;}
.score-badge b{font-size:1rem;color:#fbbf24;}
/* game title */
.game-title{font-size:0.82rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;}
/* start screen */
.game-start{text-align:center;padding:20px 0 8px;}
.game-start-icon{font-size:3rem;margin-bottom:8px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));}
.game-start-desc{color:rgba(255,255,255,.55);font-size:0.82rem;margin-bottom:16px;line-height:1.5;}
.game-start-hi{color:#fbbf24;font-weight:700;font-size:0.88rem;margin-bottom:14px;}
.btn-play{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;padding:13px 32px;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s;letter-spacing:.5px;box-shadow:0 4px 16px rgba(245,158,11,.4);}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,158,11,.5);}
/* question display */
.q-prompt{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 16px;text-align:center;margin:12px 0 14px;}
.q-nick{font-size:1.8rem;font-weight:800;color:#fff;line-height:1.2;}
.q-drug-name{font-size:1.2rem;font-weight:800;color:#a5b4fc;line-height:1.3;}
/* answer grid */
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.q-btn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);padding:14px 10px;border-radius:13px;font-family:inherit;font-size:0.82rem;cursor:pointer;transition:.2s;color:rgba(255,255,255,.9);line-height:1.4;font-weight:500;text-align:center;}
.q-btn:hover:not(:disabled){background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:translateY(-1px);}
.q-btn.correct{background:rgba(16,185,129,.25);border-color:#10b981;color:#6ee7b7;font-weight:700;}
.q-btn.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fca5a5;}
.q-btn:disabled{cursor:not-allowed;}
/* result message */
.q-result{color:rgba(255,255,255,.5);font-size:0.8rem;text-align:center;padding:10px 0 4px;}
/* combo flash */
@keyframes scoreFlash{0%{transform:scale(1.4);color:#fbbf24}100%{transform:scale(1);}}
.score-flash{animation:scoreFlash .35s ease-out;}
/* coming soon */
.coming-soon{background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:28px;text-align:center;color:#fff;margin-bottom:10px;}
/* leaderboard */
.lb-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.lb-card{border-radius:16px;overflow:hidden;}
.lb-head{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;}
.lb-title{font-size:0.68rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:1px;text-transform:uppercase;}
.lb-row{display:flex;align-items:center;gap:7px;padding:6px 10px;border-top:1px solid rgba(255,255,255,.06);}
.lb-rank{font-size:0.7rem;font-weight:800;color:rgba(255,255,255,.35);width:14px;text-align:center;flex-shrink:0;}
.lb-rank.gold{color:#fbbf24;font-size:0.8rem;}
.lb-rank.silver{color:#94a3b8;font-size:0.75rem;}
.lb-rank.bronze{color:#b45309;font-size:0.72rem;}
.lb-photo{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(255,255,255,.15);}
.lb-name{flex:1;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-score{font-size:0.72rem;font-weight:800;color:#fbbf24;flex-shrink:0;}
.lb-me{background:rgba(251,191,36,.1) !important;border-top-color:rgba(251,191,36,.2) !important;}

/* ── SHOP ── */
.egg-wobble{font-size:3.8rem;animation:wobble 2.5s ease infinite;display:block;}
@keyframes wobble{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.rates-wrap{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.rate-chip{padding:4px 10px;border-radius:16px;font-size:0.72rem;font-weight:700;}
.egg-bag-item{display:flex;align-items:center;gap:10px;padding:11px;border-radius:12px;background:var(--rb,#f8fafc);border:1.5px solid var(--rc,var(--border));margin-bottom:8px;}
.hatch-bar{height:5px;background:var(--border);border-radius:8px;overflow:hidden;margin:4px 0 2px;}
.hatch-fill{height:100%;border-radius:8px;transition:width .3s;}

/* ── MODALS ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);}
.modal-ov.active{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:24px 18px;max-width:340px;width:100%;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);position:relative;max-height:88vh;overflow-y:auto;}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.mclose{position:absolute;top:10px;right:10px;background:var(--border);border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;}
.pm-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.12);margin-bottom:9px;}
.pm-nick{font-size:1.25rem;font-weight:700;} .pm-real{color:var(--muted);font-size:0.88rem;} .pm-id{font-size:0.74rem;color:var(--muted);font-family:'Space Mono',monospace;margin:3px 0;}
.pm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px;}
.pm-stat{background:var(--bg);border-radius:9px;padding:7px 3px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.pm-stat span{font-size:1rem;} .pm-stat b{font-size:0.85rem;font-weight:700;} .pm-stat small{font-size:0.62rem;color:var(--muted);}
.pm-pet-row{display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:11px;padding:9px;margin-top:4px;}
.link-irow{display:flex;gap:6px;margin:10px 0 3px;}
.link-inp{flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.92rem;outline:none;transition:.2s;}
.link-inp:focus{border-color:var(--sci);}
.link-prev{background:var(--bg);border-radius:12px;padding:12px;margin:6px 0;display:none;}
.gacha-inner{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
.gr-badge{padding:3px 12px;border-radius:16px;color:#fff;font-size:0.72rem;font-weight:800;letter-spacing:2px;}
.gr-emoji{font-size:4.5rem;animation:gbounce .6s ease;filter:drop-shadow(0 0 16px var(--glow,#f59e0b));}
@keyframes gbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.gr-name{font-size:1.3rem;font-weight:800;} .gr-desc{font-size:0.82rem;color:var(--muted);}
.gr-btns{display:flex;gap:8px;margin-top:6px;}
.slide-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 14px;box-shadow:0 -5px 24px rgba(0,0,0,.1);z-index:400;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-height:65vh;overflow-y:auto;}
.slide-panel.active{transform:translateY(0);}
.trade-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:9px;border:2px solid var(--border);cursor:pointer;margin-bottom:6px;transition:.15s;}
.trade-item.sel{border-color:var(--sci);background:#eff6ff;}
.trade-inp{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.86rem;outline:none;margin:8px 0;}
.trade-inp:focus{border-color:var(--sci);}

/* Feed/News modal */
.feed-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;}
.feed-item:last-child{border-bottom:none;}
.feed-icon{font-size:1.4rem;flex-shrink:0;}
.feed-time{font-size:0.66rem;color:var(--muted);margin-top:2px;}
.feed-msg{font-size:0.84rem;}

/* Megaphone modal */
.mega-inp{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.9rem;outline:none;margin:10px 0;resize:none;}
.mega-inp:focus{border-color:var(--gold);}

/* Buttons */

// helpers
function rollPetFromEgg(eggType){
    const pool=PETS.filter(p=>p.rate[eggType]>0);
    const r=Math.random();let c=0;
    for(const p of pool){c+=p.rate[eggType];if(r<=c)return{...p,instId:Date.now()+'_'+Math.random().toString(36).slice(2,8)};}
    return{...pool[pool.length-1],instId:Date.now()+'_fallback'};
}
function petDailyCoins(p){
    // p = stored pet object {id, grade, rarity, ...}
    const base=RARITY[p.rarity]?.dailyBase||5;
    const g=p.grade||0;
    return base*GRADE_MULTI[g];
}
function calcTotalDaily(pets){
    const passive=(pets||[]).reduce((sum,p)=>sum+petDailyCoins(p),0);
    return {base:50, passive, total:50+passive};
}
function activeEffectLabel(effect){
    const m={
        'coin+10':'+10% เหรียญ','coin+15':'+15% เหรียญ',
        'score+3':'+3 คะแนน/ข้อ','score+5':'+5 คะแนน/ข้อ',
        'scorex1.5':'คะแนน ×1.5','coinx2':'เหรียญ ×2','scorex2':'คะแนน ×2',
        'daily+20':'+20 daily','daily+50':'+50 daily',
        'coinx2score+5':'เหรียญ ×2 + +5/ข้อ',
        'coinx3scorex2':'เหรียญ ×3 + คะแนน ×2',
        'rainbow_badge':'ป้ายรุ้ง + daily +100',
        'kirin_badge':'ป้ายทอง + เหรียญ ×2 + daily +80',
        'gold_badge':'ป้ายทอง ✨','none':'—',
    };
    return m[effect]||effect;
}

function initStudents() {
    const sci=R_SCI.map(s=>{const[nick,rest]=s.split(' (');return{nickname:nick,id:rest.replace(')',''),track:'sci'};});
    const care=R_CARE.map(s=>{const[nick,rest]=s.split(' (');return{nickname:nick,id:rest.replace(')',''),track:'care'};});
    const names=RN.split(/(?=นาย|นางสาว)/).filter(n=>n.trim()).map(n=>n.replace(/^นาย|^นางสาว/,'').trim());
    // RN เรียงตาม ID sort ascending ของทุกคน (Sci+Care รวม) — map หลัง sort
    const all=[...sci,...care].sort((a,b)=>a.id.localeCompare(b.id));
    all.forEach((s,i)=>{s.realName=names[i]||'ไม่ระบุ';});
    window.__students=all;
}

async function loadFbUsers() {
    try {
        const snap = await getDocs(collection(db,"users"));

            const x = d.data();
            if (!x.studentId) return;
            // เก็บเฉพาะ field ที่ใช้ใน member grid — ตัด customPhoto ออก ประหยัด memory

                studentId:x.studentId,
                nickname:x.nickname,
                realName:x.realName,
                track:x.track,
                coins:x.coins,
                quizHigh:x.quizHigh,
                drugHigh:x.drugHigh,
                activePet:x.activePet,
                pets:x.pets,
                flowersReceived:x.flowersReceived,
                email:x.email,
                googlePhoto:x.googlePhoto,
                // thumb: ถ้ามีใช้ thumb, ถ้าไม่มีใช้ full (compat เก่า)
                customPhoto:x.customPhotoThumb||x.customPhoto||null,
                // เก็บ full ไว้แยกสำหรับ profile modal
                customPhotoFull:x.customPhoto||null,
            };
            if (x.track === 'guest') {
                window.__guestUsers.push(light);

                window.__fbUsers[x.studentId] = light;

    if(!snap.exists())await setDoc(ref,{uid:u.uid,name:u.displayName,email:u.email,googlePhoto:u.photoURL,customPhoto:null,coins:200,pets:[],eggs:[],activePet:null,studentId:null,nickname:null,realName:null,track:null,quizHigh:0,drugHigh:0,lastDaily:null,petLastDaily:null,createdAt:serverTimestamp()});

        unsub=onSnapshot(doc(db,"users",u.uid),snap=>{
            userData=snap.data();qHigh=userData?.quizHigh||0;dqHigh=userData?.drugHigh||0;

async function checkDaily(){
    if(!currentUser||!userData)return;
    const last=userData.lastDaily?.toDate?.();const now=new Date();
    const btn=document.getElementById('daily-btn');
    // reset เที่ยงคืน — เช็คว่า lastDaily อยู่ใน calendar day เดียวกับวันนี้หรือเปล่า
    const sameDay=last&&last.toDateString()===now.toDateString();
    if(btn)btn.classList.toggle('ready',!last||!sameDay);
}
// checkPetDaily removed — passive daily รวมใน claimDaily แล้ว
window.claimDaily=async()=>{
    if(!currentUser)return;
    const btn=document.getElementById('daily-btn');
    if(!btn?.classList.contains('ready')){toast("รับได้อีกครั้งพรุ่งนี้!","info");return;}
    const {base,passive}=calcTotalDaily(userData?.pets||[]);
    const extra=activeExtraDaily();
    const total=base+passive+extra;
    await updateDoc(doc(db,"users",currentUser.uid),{coins:increment(total),lastDaily:serverTimestamp()});
    btn.classList.remove('ready');
    // breakdown toast
    let msg=`🎁 +${total}🪙`;
    if(passive>0||extra>0) msg+=` (${base}+${passive}passive${extra?'+'+extra+'active':''})`;
    toast(msg,"success");
    confetti({particleCount:80,spread:60,origin:{y:0.6}});
};

window.openUpgradeModal=async(petInstId)=>{
    if(!currentUser||!userData){toast("กรุณา Login","error");return;}
    let owned=userData?.pets||[];
    // หา mainPet: ลอง match instId ก่อน แล้ว fallback id
    let mainPet=owned.find(x=>x.instId&&String(x.instId)===String(petInstId))
        ||owned.find(x=>!x.instId&&x.id===petInstId)
        ||owned.find(x=>x.id===petInstId);
    if(!mainPet){toast("ไม่พบสัตว์เลี้ยง","error");return;}
    // ถ้า pet (หรือใครก็ตาม) ยังไม่มี instId → patch ทั้งหมดก่อน
    if(owned.some(p=>!p.instId)){
        const patchPets=owned.map(p=>({...p,instId:p.instId||(Date.now()+'_'+Math.random().toString(36).slice(2,8))}));
        await updateDoc(doc(db,"users",currentUser.uid),{pets:patchPets});
        // รอ snapshot update — ใช้ patchPets ทำงานต่อทันที
        owned=patchPets;
        // หา mainPet ใหม่จาก patched list (match ด้วย id เพราะ instId เพิ่งเปลี่ยน)
        const origId=mainPet.id;
        mainPet=patchPets.find(p=>p.id===origId&&p.instId)||(patchPets.find(p=>p.id===origId));
        if(!mainPet){toast("เกิดข้อผิดพลาด","error");return;}
    }
    const cfg=RARITY[mainPet.rarity];
    const grade=mainPet.grade||0;
    if(grade>=5){toast("Max Grade แล้ว!","info");return;}
    const nextGrade=grade+1;
    const needed=GRADE_COPIES[nextGrade];
    // สัตว์เดียวกันที่ไม่ใช่ตัวหลัก
    const candidates=owned.filter(x=>x.id===mainPet.id&&String(x.instId)!==String(mainPet.instId));
    window.__upgradeState={mainInstId:String(mainPet.instId),selected:[],needed,petId:mainPet.id};
    renderUpgradeModal(mainPet,candidates,cfg,nextGrade);
    document.getElementById('upgrade-modal').classList.add('active');
};
window.closeUpgradeModal=()=>{
    window.__upgradeState=null;
    document.getElementById('upgrade-modal').classList.remove('active');
};

function renderUpgradeModal(mainPet,candidates,cfg,nextGrade){
    const state=window.__upgradeState;
    const selCount=state.selected.length;
    const canConfirm=selCount>=state.needed;
    document.getElementById('upgrade-content').innerHTML=`
        <div style="text-align:center;margin-bottom:12px">
            <div style="font-size:2.4rem">${mainPet.emoji}</div>
            <div style="font-weight:800;font-size:1rem">${mainPet.name}</div>
            <div style="font-size:0.76rem;color:var(--muted)">
                Grade ${mainPet.grade>0?GRADE_LABELS[mainPet.grade]:'base'} → <b style="color:${cfg.color}">Grade ${GRADE_LABELS[nextGrade]}</b>
            </div>
            <div style="margin-top:6px;font-size:0.84rem">
                เลือก <b style="color:${cfg.color}">${selCount}/${state.needed}</b> ตัวเพื่อ consume
            </div>
            <div style="background:${cfg.bg};border-radius:8px;padding:5px 10px;font-size:0.76rem;margin-top:4px;display:inline-block">
                Daily จะเพิ่มเป็น <b>+${RARITY[mainPet.rarity].dailyBase*GRADE_MULTI[nextGrade]}🪙/วัน</b>
            </div>
        </div>
        ${candidates.length===0
            ?`<div style="text-align:center;color:var(--muted);padding:16px;font-size:0.84rem">ไม่มี ${mainPet.name} สำรองในกระเป๋า<br><span style="font-size:0.74rem">ต้องการ ${state.needed} ตัวเพิ่ม</span></div>`
            :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;margin-bottom:12px">
                ${candidates.map(c=>{
                    const isSel=state.selected.includes(String(c.instId));
                    const grade=c.grade||0;
                    return`<div onclick="toggleUpgradeSelect('${c.instId}')"
                        style="background:${isSel?cfg.color+'22':'#f8fafc'};border:2px solid ${isSel?cfg.color:'var(--border)'};border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:.15s;position:relative">
                        <div style="font-size:1.4rem">${mainPet.emoji}</div>
                        <div style="font-size:0.6rem;font-weight:700;margin-top:2px">${grade>0?'Grade '+GRADE_LABELS[grade]:'base'}</div>
                        <div style="font-size:0.55rem;color:var(--muted)">+${petDailyCoins(c)}🪙</div>
                        ${isSel?`<div style="position:absolute;top:-5px;right:-5px;background:${cfg.color};color:#fff;width:16px;height:16px;border-radius:50%;font-size:0.6rem;display:flex;align-items:center;justify-content:center;font-weight:800">✓</div>`:''}
                    </div>`;
                }).join('')}
            </div>`}
        <div style="display:flex;gap:7px">
            <button class="btn-gold" style="flex:1" onclick="confirmUpgrade()" ${canConfirm?'':'disabled'}>
                ✅ ยืนยัน (${selCount}/${state.needed})
            </button>
            <button class="btn-gray" style="flex:1" onclick="closeUpgradeModal()">ยกเลิก</button>
        </div>`;
}

window.toggleUpgradeSelect=(instId)=>{
    const state=window.__upgradeState;if(!state)return;
    const sid=String(instId);
    const idx=state.selected.indexOf(sid);
    if(idx>=0){state.selected.splice(idx,1);}
    else if(state.selected.length<state.needed){state.selected.push(sid);}
    else{toast(`เลือกได้แค่ ${state.needed} ตัว`,"info");return;}
    // re-render
    const owned=userData?.pets||[];
    const mainPet=owned.find(x=>String(x.instId)===String(state.mainInstId));
    const cfg=RARITY[mainPet.rarity];
    const grade=mainPet.grade||0;
    const candidates=owned.filter(x=>x.id===mainPet.id&&String(x.instId)!==String(state.mainInstId));
    renderUpgradeModal(mainPet,candidates,cfg,grade+1);
};

window.confirmUpgrade=async()=>{
    const state=window.__upgradeState;if(!state){toast("state หาย reload ใหม่","error");return;}
    if(state.selected.length<state.needed){toast(`เลือกไม่ครบ (${state.selected.length}/${state.needed})`,"error");return;}
    if(!currentUser||!userData)return;
    const pets=[...(userData.pets||[])];
    // ลบ selected copies ออก
    const toRemove=new Set(state.selected);
    const newPets=pets.filter(p=>!toRemove.has(String(p.instId)));
    // อัพ grade ของตัวหลัก
    const mainIdx=newPets.findIndex(p=>String(p.instId)===String(state.mainInstId));
    if(mainIdx<0){toast("เกิดข้อผิดพลาด","error");return;}
    const newGrade=(newPets[mainIdx].grade||0)+1;
    newPets[mainIdx]={...newPets[mainIdx],grade:newGrade};
    await updateDoc(doc(db,"users",currentUser.uid),{pets:newPets});
    closeUpgradeModal();
    const pet=newPets[mainIdx];
    toast(`${pet.emoji} อัพ Grade ${GRADE_LABELS[newGrade]}! Daily +${RARITY[pet.rarity].dailyBase*GRADE_MULTI[newGrade]}🪙/วัน`,"success");
    confetti({particleCount:120,spread:70,origin:{y:0.5}});
};

//  HELPERS
// ════════════════════════════════════════
function activePet(){
    if(!userData?.activePet||!userData?.pets)return null;
    // ลอง match instId ก่อน (ใหม่) แล้ว fallback id (legacy)
    return userData.pets.find(p=>p.instId&&String(p.instId)===String(userData.activePet))
        ||userData.pets.find(p=>p.id===userData.activePet)||null;
}
function coinMulti(){const p=activePet();if(!p)return 1;
    const e=p.effect;
    if(e==='coin+10')return 1.1;if(e==='coin+15')return 1.15;
    if(e==='coinx2'||e==='coinx2score+5')return 2;
    if(e==='coinx3scorex2')return 3;
    if(e==='kirin_badge')return 2;
    return 1;}
function scoreMulti(){const p=activePet();if(!p)return 1;
    const e=p.effect;
    if(e==='scorex2'||e==='coinx3scorex2')return 2;
    if(e==='scorex1.5')return 1.5;
    return 1;}
function scoreBonus(){const p=activePet();if(!p)return 0;
    const e=p.effect;
    if(e==='score+3')return 3;if(e==='score+5')return 5;
    if(e==='coinx2score+5')return 5;
    return 0;}
function activeExtraDaily(){const p=activePet();if(!p)return 0;
    const e=p.effect;
    if(e==='daily+20')return 20;if(e==='daily+50')return 50;
    if(e==='rainbow_badge')return 100;if(e==='kirin_badge')return 80;
    return 0;}
function getActiveBadge(){const p=activePet();if(!p)return null;return BADGE_EFFECTS[p.effect]||null;}
window.awardCoins=async(base,trackKey)=>{
    if(!currentUser)return base;
    const final=Math.floor(base*coinMulti());
    await updateDoc(doc(db,"users",currentUser.uid),{coins:increment(final)});
    if(trackKey)window[trackKey]=(window[trackKey]||0)+final;
    return final;
};
function myPhoto(thumb=false){if(!userData)return null;if(thumb)return userData.customPhotoThumb||userData.customPhoto||userData.googlePhoto||`https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name||'?')}&size=64`;return userData.customPhoto||userData.googlePhoto||`https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name||'?')}&size=256`;}

function sanitize(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function postNews(icon, msg) {
    try {
        await addDoc(collection(db,"news"), {icon, msg, ts: serverTimestamp()});
        loadTicker();
    } catch(e){}
}

async function loadTicker() {
    try {
        const q=query(collection(db,"news"),orderBy("ts","desc"),limit(5));
        const snap=await getDocs(q);
        let items=[];
        snap.forEach(d=>{const x=d.data();items.push(`${sanitize(x.icon)} ${sanitize(x.msg)}`);});
        if(!items.length)items=['ยินดีต้อนรับสู่ RxTU10 Dashboard! 🎉'];
        document.getElementById('ticker-text').textContent=items.join('  •  ');
    } catch(e){}
}

        let html='';
        const admin=isAdmin();
        snap.forEach(d=>{
            const x=d.data();const id=d.id;
            const ts=x.ts?.toDate?.();
            const timeStr=ts?ts.toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'}):'';
            html+=`<div class="feed-item" id="news-${id}">
                <div class="feed-icon">${x.icon}</div>
                <div style="flex:1"><div class="feed-msg">${sanitize(x.msg)}</div><div class="feed-time">${timeStr}</div></div>
                ${admin?`<button onclick="deleteNews('${id}')" style="background:none;border:none;color:#ef444466;cursor:pointer;font-size:1rem;flex-shrink:0;padding:2px 4px" title="ลบ">🗑️</button>`:''}
            </div>`;
        });
        document.getElementById('feed-list').innerHTML=html||'<div style="text-align:center;color:var(--muted);padding:20px">ยังไม่มีข่าว</div>';
    } catch(e){document.getElementById('feed-list').innerHTML='<div style="color:#ef4444;text-align:center;padding:16px">โหลดไม่ได้</div>';}
};
window.closeFeed=()=>document.getElementById('feed-modal').classList.remove('active');

window.giveFlower=async(targetStudentId,flowerId)=>{
    if(!currentUser||!userData)return;
    const f=FLOWERS.find(x=>x.id===flowerId);if(!f)return;
    const inv={...(userData.flowerInv||{})};
    if((inv[flowerId]||0)<1){toast("ไม่มีดอกไม้แล้ว","error");return;}
    // หา uid ของ target จาก __fbUsers
    // ค้นหาทั้งใน student cache และ guest cache
    const liveTarget=window.__fbUsers?.[targetStudentId]
        ||(window.__guestUsers||[]).find(g=>g.studentId===targetStudentId);
    if(!liveTarget?.uid){toast("ไม่พบผู้ใช้ หรือผู้รับยังไม่ได้ login","error");return;}
    if(liveTarget.uid===currentUser.uid){toast("ให้ตัวเองไม่ได้นะ 😅","error");return;}
    inv[flowerId]--;
    // เพิ่ม flowersReceived ที่ target (นับสะสม ส่งต่อไม่ได้)
    const tRef=doc(db,"users",liveTarget.uid);
    const tSnap=await getDoc(tRef);if(!tSnap.exists())return;
    const tData=tSnap.data();
    const recv={...(tData.flowersReceived||{})};
    recv[flowerId]=(recv[flowerId]||0)+1;
    await updateDoc(doc(db,"users",currentUser.uid),{flowerInv:inv});
    await updateDoc(tRef,{flowersReceived:recv});
    closeFlowerModal();
    const sName=userData.nickname||userData.name||'?';
    const tName=window.__students?.find(x=>x.id===targetStudentId)?.nickname||targetStudentId;
    toast(`${f.emoji} มอบ ${f.name} ให้ ${tName} แล้ว!`,"success");
    confetti({particleCount:60,spread:70,origin:{y:0.5},colors:['#f43f5e','#fb7185','#fda4af']});
    await postNews(f.emoji,`${sName} มอบ ${f.name} ให้ ${tName}!`);
    loadFbUsers();
};

window.triggerPhoto=()=>document.getElementById('photo-input').click();
window.handlePhoto=async(e)=>{
    const file=e.target.files[0];if(!file||!currentUser)return;
    if(!file.type.startsWith('image/')){toast("ไฟล์ต้องเป็นรูปภาพเท่านั้น","error");return;}
    if(file.size>5*1024*1024){toast("ไฟล์ใหญ่เกิน 5MB","error");return;}
    toast("กำลังประมวลผล...","info");
    const reader=new FileReader();
    reader.onload=ev=>{const img=new Image();img.onload=async()=>{
        // helper: resize canvas แล้ว return base64
        function resizeToB64(maxPx,quality){
            const c=document.createElement('canvas');
            let w=img.width,h=img.height;
            if(w>h){if(w>maxPx){h=Math.round(h*(maxPx/w));w=maxPx;}}
            else{if(h>maxPx){w=Math.round(w*(maxPx/h));h=maxPx;}}
            c.width=w;c.height=h;
            c.getContext('2d').drawImage(img,0,0,w,h);
            return c.toDataURL('image/jpeg',quality);
        }
        // full: 200px, quality 0.72
        const full=resizeToB64(200,0.72);
        // thumb: 60px, quality 0.60
        const thumb=resizeToB64(60,0.60);
        // ตรวจ size หลัง encode — Base64 1 char ≈ 0.75 byte
        const fullKB=Math.round(full.length*0.75/1024);
        const thumbKB=Math.round(thumb.length*0.75/1024);
        // Firestore doc limit ~1MB, รูปต้องไม่เกิน 250KB รวมกัน
        if(fullKB+thumbKB>250){
            toast(`รูปหลัง compress ยังใหญ่เกิน (${fullKB+thumbKB}KB) ลองใช้รูปอื่น`,"error");
            return;
        }
        await updateDoc(doc(db,"users",currentUser.uid),{
            customPhoto:full,
            customPhotoThumb:thumb
        });
        toast(`อัพโหลดสำเร็จ! (full ${fullKB}KB · thumb ${thumbKB}KB)`,"success");
    };img.src=ev.target.result;};
    reader.readAsDataURL(file);e.target.value='';
};

window.startQuiz=()=>{

window.nextQ=()=>{
    const s=window.__students;if(!s?.length)return;
    const st=s[Math.floor(Math.random()*s.length)];qAnswer=st.realName;
    document.getElementById('q-nick').textContent=st.nickname.split(' ')[0];
    // shuffle แทน while-loop: สุ่ม pool แล้ว slice — ป้องกัน infinite loop
    const wrongPool=[...new Set(s.map(x=>x.realName))].filter(n=>n!==qAnswer).sort(()=>Math.random()-.5);
    const opts=[qAnswer,...wrongPool.slice(0,3)].sort(()=>Math.random()-.5);
    opts.sort(()=>Math.random()-0.5);
    document.getElementById('q-opts').innerHTML=opts.map(o=>`<button class="q-btn" onclick="answerQ(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');

window.answerQ=async(btn,ans)=>{
    document.querySelectorAll('.q-btn').forEach(b=>{
        b.disabled=true;
        if(b.textContent===qAnswer) b.classList.add('correct');
        else if(b.textContent===ans) b.classList.add('wrong');
    });
    if(ans===qAnswer){
        qScore++;
        const disp=qScore*scoreMulti()+scoreBonus();
        const qs=document.getElementById('q-score');qs.textContent=disp;qs.classList.remove('score-flash');void qs.offsetWidth;qs.classList.add('score-flash');
        await window.awardCoins(5,'__qCoinsEarned');
        confetti({particleCount:25,spread:50,origin:{y:0.7},colors:['#10b981']});
        setTimeout(nextQ,700);
    } else {
        const finalScore=qScore;
        const name=userData?.nickname?.split(' ')[0]||userData?.name||'?';
        if(currentUser&&finalScore>qHigh){
            qHigh=finalScore;
            await updateDoc(doc(db,"users",currentUser.uid),{quizHigh:finalScore});
            await postNews("🏆",`${name} ทำ High Score ใหม่ในเกมทายชื่อ: ${finalScore} คะแนน!`);

            if(userData?.studentId&&window.__fbUsers?.[userData.studentId])window.__fbUsers[userData.studentId].quizHigh=finalScore;

            __quizTop5Posted=true;
            await postNews("🎮",`${name} ทำได้ ${finalScore} ข้อในเกมทายชื่อ — Top 5%! 🔥`);
        }
        setTimeout(()=>{
            document.getElementById('quiz-start').style.display='block';

            const base5=finalScore*5;const earned=window.__qCoinsEarned||0;

window.switchTab=(tab)=>{

        <div id="mgrid">${memberGrid()}</div>`;
}
function memberGrid(){
    let list=window.__students||[];
    if(mTrack!=='all')list=list.filter(s=>s.track===mTrack);
    if(mSearch){const q=mSearch.toLowerCase();list=list.filter(s=>s.nickname.toLowerCase().includes(q)||s.id.includes(q)||s.realName.toLowerCase().includes(q));}
    if(!list.length)return`<div style="text-align:center;color:var(--muted);padding:24px">ไม่พบ</div>`;
    return`<div class="mgrid">${list.map(s=>{
        const tc=s.track==='sci'?'var(--sci)':'var(--care)';
        const live=window.__fbUsers?.[s.id];
        const photoSrc=live?.customPhoto||live?.googlePhoto||`img/${s.id}.jpg`;
        const def=`https://ui-avatars.com/api/?name=${encodeURIComponent(s.nickname.split(' ')[0])}&background=${s.track==='sci'?'2563eb':'10b981'}&color=fff&size=128`;
        // activePet: match instId ก่อน (ใหม่) fallback id (legacy)
        const petData=live?.activePet
            ?(live.pets||[]).find(p=>p.instId&&String(p.instId)===String(live.activePet))
              ||(live.pets||[]).find(p=>p.id===live.activePet)
            :null;
        const badge=petData?BADGE_EFFECTS[petData.effect]:null;
        const petGrade=petData?(petData.grade||0):0;
        const petColor=petData?(RARITY[petData.rarity]?.color||'#64748b'):'';
        return`<div class="mcard" onclick="openProfileModal('${s.id}')">
            <div style="position:relative;width:64px;height:64px;margin-bottom:4px">
                <img src="${photoSrc}" onerror="this.onerror=null;this.src='${def}'" class="mc-img" style="width:64px;height:64px">
                ${petData?`<div style="position:absolute;bottom:-6px;right:-6px;font-size:1.25rem;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));line-height:1">${petData.emoji}${petGrade>0?`<span style="position:absolute;bottom:-1px;right:-4px;background:${petColor};color:#fff;font-size:0.38rem;font-weight:800;padding:1px 3px;border-radius:3px;line-height:1.4">${GRADE_LABELS[petGrade]}</span>`:''}
                </div>`:''}
            </div>
            ${(()=>{if(!badge)return'<div class="mc-nick">'+s.nickname+'</div>';return'<div style="border-radius:7px;padding:1px 6px;font-size:0.82rem;font-weight:600;background:'+badge.bg+';border:1.5px solid '+badge.border+'">'+s.nickname+'</div>';})()}
            <div class="mc-id" style="font-size:0.6rem">${s.id}</div>
            <span class="track-badge" style="background:${tc};font-size:0.52rem;padding:2px 6px">${s.track==='sci'?'SCI':'CARE'}</span>
        </div>`;
    }).join('')}</div>`;
}
window.mFilter=t=>{mTrack=t;const g=document.getElementById('mgrid');if(g)g.innerHTML=memberGrid();};
window.mSearchFn=v=>{mSearch=v;const g=document.getElementById('mgrid');if(g)g.innerHTML=memberGrid();};

window.openProfileModal=(id)=>{
    const s=window.__students?.find(x=>x.id===id);if(!s)return;
    // ใช้ cache แทน getDocs — ไม่เสีย reads
    const liveData=window.__fbUsers?.[id]||null;
    const tc=s.track==='sci'?'var(--sci)':'var(--care)';
    const def=`https://ui-avatars.com/api/?name=${encodeURIComponent(s.nickname.split(' ')[0])}&background=${s.track==='sci'?'2563eb':'10b981'}&color=fff&size=256`;
    const photo=liveData?.customPhotoFull||liveData?.customPhoto||liveData?.googlePhoto||`img/${s.id}.jpg`;
    // activePet: instId match ก่อน fallback id (compat)
    const petData=liveData?.activePet
        ?(liveData.pets||[]).find(p=>p.instId&&String(p.instId)===String(liveData.activePet))
          ||(liveData.pets||[]).find(p=>p.id===liveData.activePet)

    const petShowcase=(()=>{

        if(!allPets.length)return'<div style="color:var(--muted);font-size:0.78rem;margin-top:6px">ไม่มีสัตว์เลี้ยง</div>';
        const activePetHtml=petData?`
            <div style="background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openFriendPetInfo('${s.id}','${String(petData.instId||petData.id)}')">

                    ${petData.emoji}

                    <div style="font-weight:800;color:#fff;font-size:0.92rem">${petData.name}${(petData.grade||0)>0?' <span style="background:'+RARITY[petData.rarity]?.color+';color:#fff;font-size:0.52rem;padding:1px 5px;border-radius:4px">'+GRADE_LABELS[petData.grade]+'</span>':''}</div>

        :'<div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">ไม่มีสัตว์ active</div>';
        // mini grid สัตว์ทั้งหมด (คลิกดูรายละเอียดได้)
        const gridHtml=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:5px">

    // เพิ่มปุ่มมอบดอกไม้ถ้าไม่ใช่โปรไฟล์ตัวเอง
    if(currentUser && s.id !== userData?.studentId){

            const recv=liveData.flowersReceived;
            const total=Object.values(recv).reduce((a,b)=>a+b,0);
            if(total>0){
                const flowerRow=document.createElement('div');
                flowerRow.style.cssText='margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap';
                flowerRow.innerHTML=FLOWERS.filter(f=>(recv[f.id]||0)>0).map(f=>`<span style="background:#fff5f5;border:1px solid #fca5a5;border-radius:16px;padding:3px 10px;font-size:0.78rem">
                    ${f.emoji} ×${recv[f.id]}</span>`).join('');
                document.getElementById('pm-content').appendChild(flowerRow);
            }
        }
    }
    document.getElementById('profile-modal').classList.add('active');
};

//  LEADERBOARD (ใช้ cache __fbUsers — ไม่ต้อง read Firestore เพิ่ม)
// ════════════════════════════════════════
function buildLeaderboard(){
    const myStudentId=userData?.studentId;
    // รวม fbUsers + guestUsers
    const allUsers=[
        ...Object.values(window.__fbUsers||{}),
        ...(window.__guestUsers||[])
    ];
    // Quiz leaderboard: 1 คน 1 อันดับ (quizHigh สูงสุด)
    const quizBoard=[...allUsers]
        .filter(u=>u.quizHigh>0)
        .sort((a,b)=>b.quizHigh-a.quizHigh)
        .slice(0,7);
    // Drug leaderboard
    const drugBoard=[...allUsers]
        .filter(u=>u.drugHigh>0)
        .sort((a,b)=>b.drugHigh-a.drugHigh)
        .slice(0,7);

    function renderBoard(board,scoreKey,accentColor){
        if(!board.length)return`<div style="padding:14px;text-align:center;color:rgba(255,255,255,.3);font-size:0.78rem">ยังไม่มีข้อมูล</div>`;
        const rankIcon=['🥇','🥈','🥉'];
        return board.map((u,i)=>{
            const isMe=myStudentId&&u.studentId===myStudentId;
            const petData=u.activePet
                ?(u.pets||[]).find(p=>p.instId&&String(p.instId)===String(u.activePet))
                 ||(u.pets||[]).find(p=>p.id===u.activePet)
                :null;
            const photo=u.customPhoto||u.googlePhoto||`https://ui-avatars.com/api/?name=${encodeURIComponent((u.nickname||'?').slice(0,1))}&background=334155&color=fff&size=64`;
            const def=`https://ui-avatars.com/api/?name=${encodeURIComponent((u.nickname||'?').slice(0,1))}&background=334155&color=fff&size=64`;
            const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
            return`<div class="lb-row${isMe?' lb-me':''}">
                <div class="lb-rank ${rankClass}">${i<3?rankIcon[i]:i+1}</div>
                <img src="${photo}" class="lb-photo" onerror="this.onerror=null;this.src='${def}'">
                <div class="lb-name">${u.nickname||'?'}${petData?` ${petData.emoji}`:''}</div>
                <div class="lb-score" style="color:${accentColor}">${u[scoreKey]}</div>
            </div>`;
        }).join('');
    }

    return`<div class="lb-wrap">
        <div class="lb-card" style="background:linear-gradient(160deg,#0f172a,#1e293b)">
            <div class="lb-head" style="background:rgba(16,185,129,.12)">
                <span class="lb-title">🕵️ ทายชื่อ</span>
                <span style="font-size:0.62rem;color:rgba(255,255,255,.3)">Top ${quizBoard.length}</span>
            </div>
            ${renderBoard(quizBoard,'quizHigh','#6ee7b7')}
        </div>
        <div class="lb-card" style="background:linear-gradient(160deg,#1e1b4b,#312e81)">
            <div class="lb-head" style="background:rgba(129,140,248,.12)">
                <span class="lb-title">💊 ทายยา</span>
                <span style="font-size:0.62rem;color:rgba(255,255,255,.3)">Top ${drugBoard.length}</span>
            </div>
            ${renderBoard(drugBoard,'drugHigh','#a5b4fc')}
        </div>
    </div>`;
}

    const coins=userData?.coins||0;const canMega=!!currentUser&&coins>=MEGA_COST;
    const owned=new Set((userData?.pets||[]).map(p=>p.id));
    const pendingEgg=(userData?.eggs||[]).some(e=>!e.startedAt);
    return`
        <div style="background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
            <div>
                <div style="font-size:0.68rem;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">🛒 ร้านค้า</div>
                <div style="font-size:1.4rem;font-weight:800;color:#fbbf24">🪙 ${coins.toLocaleString()}</div>
                <div style="font-size:0.68rem;color:rgba(255,255,255,.4)">เหรียญที่มี</div>
            </div>
            <div style="text-align:right">
                <div style="font-size:0.68rem;color:rgba(255,255,255,.4);margin-bottom:4px">ซื้อไข่เพื่อฟักสัตว์เลี้ยง</div>
                <div style="font-size:0.78rem;color:rgba(255,255,255,.5)">Normal → Rare → Epic → Legendary</div>
            </div>
        </div>
        <div class="card">
            <div style="font-weight:800;font-size:0.95rem;margin-bottom:10px;text-align:center">🥚 เลือกไข่</div>
            ${Object.entries(EGG_TYPES).map(([type,et])=>{
                const canBuy=!!currentUser&&coins>=et.cost;
                return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
                    <div style="font-size:1.8rem;flex-shrink:0">${type==='normal'?'🥚':type==='gold'?'🥚✨':'🥚🌈'}</div>
                    <div style="flex:1">
                        <div style="font-weight:700;font-size:0.9rem">${et.label}</div>
                        <div style="font-size:0.72rem;color:var(--muted)">${et.desc}</div>
                    </div>
                    <button class="btn-gold sm" onclick="buyEgg('${type}')" ${canBuy?'':'disabled'}>${et.cost}🪙</button>
                </div>`;
            }).join('')}
            <div style="display:flex;align-items:center;gap:10px;padding:9px 0">
                <div style="font-size:1.8rem;flex-shrink:0">⚡</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:0.9rem">Instant Hatch</div>
                    <div style="font-size:0.72rem;color:var(--muted)">ฟักไข่ที่รออยู่ทันที 1 ใบ${!pendingEgg?' (ไม่มีไข่รอฟัก)':''}</div>
                </div>
                <button class="btn-gold sm" onclick="buyInstantHatch()" ${currentUser&&coins>=INSTANT_COST&&pendingEgg?'':'disabled'}>${INSTANT_COST}🪙</button>
            </div>
        </div>

        <div class="sec-head">💐 ดอกไม้</div>
        <div class="card">
            <div style="font-size:0.8rem;color:var(--muted);margin-bottom:10px">ซื้อเก็บไว้แล้วมอบให้ผู้เล่นอื่น — เพิ่มคะแนนความนิยม</div>
            ${FLOWERS.map(f=>{
                const cnt=(userData?.flowerInv||{})[f.id]||0;
                const canBuy=!!currentUser&&(userData?.coins||0)>=f.cost;
                return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
                    <div style="font-size:1.8rem;flex-shrink:0">${f.emoji}</div>
                    <div style="flex:1">
                        <div style="font-weight:700;font-size:0.9rem">${f.name}</div>
                        <div style="font-size:0.72rem;color:var(--muted)">${f.desc} · มีในมือ <b>${cnt}</b> ดอก</div>
                    </div>
                    <button class="btn-gold sm" onclick="buyFlower('${f.id}')" ${canBuy?'':'disabled'}>${f.cost}🪙</button>
                </div>`;
            }).join('')}
        </div>

        <div class="sec-head">📣 ไอเทมพิเศษ</div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:12px;padding:4px 0">
                <div style="font-size:2.4rem;flex-shrink:0">📣</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:0.95rem">โทรโข่ง</div>
                    <div style="font-size:0.76rem;color:var(--muted)">ส่งข้อความถึงทุกคน — ${MEGA_COST}🪙</div>
                </div>
                <button class="btn-gold sm" onclick="openMega()" ${canMega?'':'disabled'}>${MEGA_COST}🪙</button>
            </div>
        </div>

        <div class="sec-head">🐾 Pokedex สัตว์ทั้งหมด</div>
        <div class="card">
            ${['common','rare','epic','legendary'].map(r=>{
                const list=PETS.filter(p=>p.rarity===r);const cfg=RARITY[r];
                return`<div style="margin-bottom:14px">
                    <div style="font-weight:700;color:${cfg.color};font-size:0.76rem;margin-bottom:6px">${cfg.label} · +${cfg.dailyBase}🪙/วัน · ฟัก ${HATCH_LABELS[r]}</div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:6px">
                        ${list.map(p=>{
                            const have=owned.has(p.id);
                            return`<div style="background:${have?cfg.bg:'#f8fafc'};border-radius:10px;padding:8px 4px;text-align:center;border:1.5px solid ${have?cfg.color+'66':cfg.color+'22'};position:relative;opacity:${have?1:0.55}">
                                <div style="font-size:1.5rem">${have?p.emoji:'❓'}</div>
                                <div style="font-size:0.64rem;font-weight:700;margin-top:2px">${have?p.name:'???'}</div>
                                <div style="font-size:0.55rem;color:var(--muted);margin-top:1px">${have?activeEffectLabel(p.effect):'??'}</div>
                                ${have?'<div style="position:absolute;top:3px;right:4px;font-size:0.5rem;color:'+cfg.color+'">✓</div>':''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('')}
        </div>`;
}

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
window.__tab='home';
loadTicker();
// Hatch timer refresh — only when eggs actively hatching, never during game
let __hatchTimer=setInterval(()=>{
    const eggs=(userData?.eggs||[]);
    const hasHatching=eggs.some(e=>e.startedAt&&Date.now()<e.startedAt+e.hatchMins*60000);
    if(!hasHatching) return;
    if(window.__tab==='home') renderTab('home'); // เฉพาะ home ที่มี egg UI
},10000);

</script>

<script>
window.toast=(msg,type='info')=>{const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);};
</script>
</body>
</html>
